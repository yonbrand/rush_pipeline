# ============================================================================
# RUSH Gait Pipeline Configuration
# ============================================================================

sensor_device: Axivity  # GENEActive or Axivity

pipeline:
  resampled_hz: 30
  window_sec: 10
  window_overlap_sec: 9
  min_bout_duration_sec: 10
  merge_gap_sec: 3
  inference_batch_size: 512
  drop_first_last_days: true
  epoch_len: 10
  filter_static_windows: true  # Use Otsu's method to filter low-variance (static) windows before gait detection.
  min_wear_hours: 72  # Minimum hours of valid wear data (72h = 3 days). Subjects below this are excluded.
  require_all_hours: true  # Require wear data in each one-hour period of the 24-hour cycle.
  max_gap_minutes: 60  # Maximum non-wear gap (minutes) to impute. Gaps longer than this are NOT imputed; the longest contiguous valid segment is kept.

entropy:
  m: 2
  r: 0.15
  max_seconds: 120

frequency:
  nperseg: 256
  min_bout_seconds: 2

models:
  gait_detection:
    net: ElderNet
    head: fc
    output_size: 2
    is_classification: true
    pretrained: true
    trained_model_path: "models/gait_detection_model.pt"
    name_start_idx: 0

  step_count:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 25
    pretrained: true
    trained_model_path: "models/step_count_model.pt"
    name_start_idx: 0

  gait_speed:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 0
    batch_norm: false
    max_mu: 2.0
    pretrained: true
    trained_model_path: "models/gait_speed_model.pt"
    name_start_idx: 0

  cadence:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 160
    pretrained: true
    trained_model_path: "models/cadence_model.pt"
    name_start_idx: 0

  gait_length:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 2.0
    pretrained: true
    trained_model_path: "models/stride_length_model.pt"
    name_start_idx: 0

  regularity:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: false
    max_mu: 1.0
    pretrained: true
    trained_model_path: "models/regularity_model.pt"
    name_start_idx: 0

data:
  data_path: "N:/Projects/RUSH/Data/axivity 2024/Mat files/acc"      # Path to input .mat files (GENEActive or Axivity)
  output_path: "N:/Gait-Neurodynamics by Names/Yonatan/RUSH/rush_pipeline/outputs"   # Path for pipeline output

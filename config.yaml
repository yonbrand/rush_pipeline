# ============================================================================
# RUSH Gait Pipeline Configuration
# ============================================================================

sensor_device: GENEActive  # GENEActive or Axivity

pipeline:
  resampled_hz: 30
  window_sec: 10
  window_overlap_sec: 9
  min_bout_duration_sec: 10
  merge_gap_sec: 3
  inference_batch_size: 512
  drop_first_last_days: true
  epoch_len: 10
  filter_static_windows: true  # Use Otsu's method to filter low-variance (static) windows before gait detection.
  min_wear_hours: 72  # Minimum hours of valid wear data (72h = 3 days). Subjects below this are excluded.
  require_all_hours: true  # Require wear data in each one-hour period of the 24-hour cycle.

entropy:
  m: 2
  r: 0.15
  max_seconds: 120

frequency:
  nperseg: 256
  min_bout_seconds: 2

models:
  gait_detection:
    net: ElderNet
    head: fc
    output_size: 2
    is_classification: true
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/SSL/ElderNet/outputs/gait_detection_mobD_cap24.pt"
    name_start_idx: 0

  step_count:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 25
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/gait-speed/outputs/step_count/TVS_ElderNet_pretrained_True_data_10_overlap_9Sec/final_training/final_model.pt"
    name_start_idx: 0

  gait_speed:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 0
    batch_norm: false
    max_mu: 2.0
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/gait-speed/outputs/gait_speed/TVS_ElderNet_pretrained_True_data_10_overlap_9Sec/final_training/final_model_paper.pt"
    name_start_idx: 0

  cadence:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 160
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/gait-speed/outputs/cadence/TVS_ElderNet_pretrained_True_data_10_overlap_9Sec/final_training/final_model.pt"
    name_start_idx: 0

  gait_length:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: true
    max_mu: 2.0
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/gait-speed/outputs/gait_length/TVS_ElderNet_pretrained_True_data_10_overlap_9Sec/final_training/final_model.pt"
    name_start_idx: 0

  regularity:
    net: ElderNet
    head: fc
    output_size: 1
    is_regression: true
    num_layers: 1
    batch_norm: false
    max_mu: 1.0
    pretrained: true
    trained_model_path: "N:/Gait-Neurodynamics by Names/Yonatan/gait-speed/outputs/regularity/TVS_ElderNet_pretrained_True_data_10_overlap_9Sec/final_training/final_model.pt"
    name_start_idx: 0

data:
  data_path: "N:/Projects/RUSH/Data/GENEActive_mat"
  output_path: "N:/Gait-Neurodynamics by Names/Yonatan/RUSH/output_data"
